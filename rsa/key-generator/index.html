<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="en" http-equiv="content-language" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>RSA Key Generator - Online Tools</title>

    <meta content="RSA,key,generate,pem,PKCS#1,PKCS#5,PKCS#8" name="keywords" />
    <meta content="emn178" name="author" />
    <meta content="emn178" name="copyright" />
    <meta
      content="This online tool helps you generate a pair of RSA keys. The PEM format supports PKCS#1, PKCS#5, and PKCS#8."
      name="description"
    />

    <link href="/images/logo.svg" rel="icon" />
    <script>
      var delayScripts = [];
      var waitLoadCount = 0;
      if (localStorage.getItem("DARK") === "1") {
        document.documentElement.classList.add("dark-theme");
      }
    </script>
    <link href="/css/style.css?v=27" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar"></div>
      <div id="content">
        <div class="top-nav">
          <button
            aria-controls="sidebar"
            aria-expanded="false"
            aria-label="Menu"
            id="sidebar-toggler"
          >
            <img alt="Menu" height="24" src="/images/menu.svg" width="24" />
          </button>
        </div>
        <header>
          <h1>RSA Key Generator</h1>
          <p>
            This online tool helps you generate a pair of RSA keys. The PEM
            format supports PKCS#1, PKCS#5, and PKCS#8.
          </p>
        </header>
        <main>
          <div class="layout">
            <div class="layout-block">
              <div class="output">
                <div class="block block-fill">
                  <div class="block-title">
                    Private Key
                    <div class="toolbar">
                      <a
                        class="icon"
                        download="download"
                        id="download-image"
                        style="display: none"
                        ><img
                          alt="Download"
                          src="/images/download.svg"
                          title="Download" /></a
                      ><button
                        class="icon"
                        data-clipboard-target="#output"
                        data-message="Private Key copied"
                        data-toggle="copy"
                      >
                        <img
                          alt="Copy"
                          src="/images/copy.svg"
                          title="Copy"
                        /></button
                      ><button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    id="output"
                    placeholder="Private key here..."
                    readonly="readonly"
                    spellcheck="false"
                  ></textarea>
                </div>
                <div class="block block-fill">
                  <div class="block-title">
                    Public Key
                    <div class="toolbar">
                      <a
                        class="icon"
                        download="public.pem"
                        id="download-public"
                        style="display: none"
                        ><img
                          alt="Download"
                          src="/images/download.svg"
                          title="Download" /></a
                      ><button
                        class="icon"
                        data-clipboard-target="#public-key"
                        data-message="Public Key copied"
                        data-toggle="copy"
                      >
                        <img
                          alt="Copy"
                          src="/images/copy.svg"
                          title="Copy"
                        /></button
                      ><button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    id="public-key"
                    placeholder="Public key here..."
                    readonly="readonly"
                    spellcheck="false"
                  ></textarea>
                </div>
                <details class="block text-only" data-toggle="copyblock">
                  <summary class="block-title">
                    Share Link
                    <div class="toolbar">
                      <button
                        class="icon"
                        data-clipboard-target="#share-link"
                        data-message="Share link copied"
                        data-toggle="copy"
                      >
                        <img alt="Copy" src="/images/copy.svg" title="Copy" />
                      </button>
                    </div>
                  </summary>
                  <input
                    id="share-link"
                    placeholder="Share Link"
                    readonly="readonly"
                    type="text"
                  />
                </details>
              </div>
            </div>
            <div class="settings">
              <div class="block block-fill">
                <div class="block-title">Settings</div>
                <div class="container">
                  <div class="setting">
                    <a class="btn" id="execute">Generate</a>
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input
                        checked=""
                        id="auto-update"
                        type="checkbox"
                        value="1"
                      />
                      <div class="toggle"></div>
                      <span>Auto Update</span></label
                    >
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input id="remember-input" type="checkbox" value="1" />
                      <div class="toggle"></div>
                      <span>Remember Input</span></label
                    >
                  </div>
                  <div class="setting">
                    <label for="rsa-bits">Bits</label
                    ><input
                      data-option="rsa-bits"
                      data-remember="rsa-bits"
                      data-share="rsa_bits"
                      id="rsa-bits"
                      max="4096"
                      min="512"
                      step="1"
                      type="number"
                      value="1024"
                    />
                  </div>
                  <div class="setting">
                    <label for="pem-format">Format</label
                    ><select
                      data-option="pem-format"
                      data-remember="pem-format"
                      data-share="pem_format"
                      id="pem-format"
                    >
                      <option value="PKCS1">PKCS#1</option>
                      <option value="PKCS5">PKCS#5</option>
                      <option selected="" value="PKCS8">PKCS#8</option>
                    </select>
                  </div>
                  <div class="setting" id="cipher-algorithm-block">
                    <label for="cipher-algorithm">Cipher Algorithm</label
                    ><select
                      data-option="cipher-algorithm"
                      data-remember="cipher-algorithm"
                      data-share="cipher_algorithm"
                      id="cipher-algorithm"
                    >
                      <option value="AES-128-CBC">AES-128-CBC</option>
                      <option value="AES-192-CBC">AES-192-CBC</option>
                      <option selected="" value="AES-256-CBC">
                        AES-256-CBC
                      </option>
                      <option value="DES-CBC">DES-CBC</option>
                      <option value="DES-EDE3-CBC">DES-EDE3-CBC</option>
                    </select>
                  </div>
                  <div class="setting" id="passpharse-wrap">
                    <div class="setting" id="passphrase-enabled-block">
                      <label class="switcher"
                        ><input
                          data-option="passphrase-enabled"
                          data-remember="passphrase-enabled"
                          data-share="passphrase_enabled"
                          data-target="#passphrase-block"
                          data-toggle="toggle"
                          id="passphrase-enabled"
                          type="checkbox"
                          value="1"
                        />
                        <div class="toggle"></div>
                        <span>Passphrase</span></label
                      >
                    </div>
                    <div
                      class="setting"
                      id="passphrase-block"
                      style="display: none"
                    >
                      <label for="passphrase">Passphrase</label
                      ><input
                        data-option="passphrase"
                        data-remember="passphrase"
                        data-share="passphrase"
                        id="passphrase"
                        type="text"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/jsrsasign.js?v=1",
              onload: function () {
                window.method = withOptions(rsa.generate, [
                  "rsa-bits",
                  "pem-format",
                  "cipher-algorithm",
                  "passphrase-enabled",
                  "passphrase",
                ]);
                methodLoad();
              },
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/jsrsasign-all-min.min.js",
              onload: function () {
                methodLoad();
              },
            });
          </script>
          <script>
            delayScripts.push({
              src: "/js/clipboard.min.js",
              onload: function () {
                new ClipboardJS('[data-toggle="copy"]').on(
                  "success",
                  function (e) {
                    showMessage(e.trigger.getAttribute("data-message"));
                  },
                );
              },
              delay: 100,
            });
          </script>
        </main>
      </div>
      <div id="message"></div>
    </div>
    <script defer="" src="/js/sidebar.js"></script>
    <script
      defer=""
      src="https://code.jquery.com/jquery-1.10.1.min.js"
    ></script>
    <script defer="" src="/js/main.js?v=41"></script>
  </body>
</html>
