<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="en" http-equiv="content-language" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>RSA Verify Signature - Online Tools</title>

    <meta content="RSA,Verify,Signature,pem,hex,base64" name="keywords" />
    <meta content="emn178" name="author" />
    <meta content="emn178" name="copyright" />
    <meta
      content="This online tool helps you verify signatures using RSA. It supports various curves and signature algorithms."
      name="description"
    />

    <link href="/images/logo.svg" rel="icon" />
    <script>
      var delayScripts = [];
      var waitLoadCount = 0;
      if (localStorage.getItem("DARK") === "1") {
        document.documentElement.classList.add("dark-theme");
      }
    </script>
    <link href="/css/style.css?v=27" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar"></div>
      <div id="content">
        <div class="top-nav">
          <button
            aria-controls="sidebar"
            aria-expanded="false"
            aria-label="Menu"
            id="sidebar-toggler"
          >
            <img alt="Menu" height="24" src="/images/menu.svg" width="24" />
          </button>
        </div>
        <header>
          <h1>RSA Verify Signature</h1>
          <p>
            This online tool helps you verify signatures using RSA. It supports
            various curves and signature algorithms.
          </p>
        </header>
        <main>
          <div class="layout">
            <div class="layout-block">
              <div class="input">
                <div class="block block-fill">
                  <div class="block-title">
                    Input
                    <div class="toolbar">
                      <button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    data-auto-update=""
                    data-encoding-from="#input-type"
                    data-remember="input"
                    data-share="input"
                    data-toggle="monacoEditor"
                    id="input"
                    placeholder="Enter here..."
                    spellcheck="false"
                  ></textarea>
                </div>
              </div>
              <div class="output">
                <div class="block block-fill">
                  <div class="block-title">
                    Output
                    <div class="toolbar">
                      <button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <div class="container" id="validate-result"></div>
                  <textarea
                    class="container"
                    data-encoding-from="#output-type"
                    id="output"
                    placeholder="Error message..."
                    readonly="readonly"
                    spellcheck="false"
                  ></textarea>
                </div>
                <details class="block text-only" data-toggle="copyblock">
                  <summary class="block-title">
                    Share Link
                    <div class="toolbar">
                      <button
                        class="icon"
                        data-clipboard-target="#share-link"
                        data-message="Share link copied"
                        data-toggle="copy"
                      >
                        <img alt="Copy" src="/images/copy.svg" title="Copy" />
                      </button>
                    </div>
                  </summary>
                  <input
                    id="share-link"
                    placeholder="Share Link"
                    readonly="readonly"
                    type="text"
                  />
                </details>
              </div>
            </div>
            <div class="settings">
              <div class="block block-fill">
                <div class="block-title">Settings</div>
                <div class="container">
                  <div class="setting">
                    <a class="btn" id="execute">Verify</a>
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input
                        checked=""
                        id="auto-update"
                        type="checkbox"
                        value="1"
                      />
                      <div class="toggle"></div>
                      <span>Auto Update</span></label
                    >
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input id="remember-input" type="checkbox" value="1" />
                      <div class="toggle"></div>
                      <span>Remember Input</span></label
                    >
                  </div>
                  <div class="setting">
                    <label for="input-type">Input Encoding</label
                    ><select
                      data-auto-update=""
                      data-remember="input-type"
                      data-share="input_type"
                      data-toggle="encoding"
                      id="input-type"
                    >
                      <optgroup label="Binary">
                        <option value="hex">Hex</option>
                        <option data-load-encoding="base64" value="base64">
                          Base64
                        </option>
                      </optgroup>
                      <optgroup label="Text">
                        <option selected="" value="utf-8">UTF-8</option>
                        <option data-load-encoding="1" value="utf-16le">
                          UTF-16LE
                        </option>
                        <option data-load-encoding="1" value="utf-16be">
                          UTF-16BE
                        </option>
                        <option data-load-encoding="2" value="ibm866">
                          IBM866
                        </option>
                        <option data-load-encoding="2" value="iso-8859-2">
                          ISO-8859-2
                        </option>
                        <option data-load-encoding="2" value="iso-8859-3">
                          ISO-8859-3
                        </option>
                        <option data-load-encoding="2" value="iso-8859-4">
                          ISO-8859-4
                        </option>
                        <option data-load-encoding="2" value="iso-8859-5">
                          ISO-8859-5
                        </option>
                        <option data-load-encoding="2" value="iso-8859-6">
                          ISO-8859-6
                        </option>
                        <option data-load-encoding="2" value="iso-8859-7">
                          ISO-8859-7
                        </option>
                        <option data-load-encoding="2" value="iso-8859-8">
                          ISO-8859-8
                        </option>
                        <option data-load-encoding="2" value="iso-8859-8-i">
                          ISO-8859-8-I
                        </option>
                        <option data-load-encoding="2" value="iso-8859-10">
                          ISO-8859-10
                        </option>
                        <option data-load-encoding="2" value="iso-8859-13">
                          ISO-8859-13
                        </option>
                        <option data-load-encoding="2" value="iso-8859-14">
                          ISO-8859-14
                        </option>
                        <option data-load-encoding="2" value="iso-8859-15">
                          ISO-8859-15
                        </option>
                        <option data-load-encoding="2" value="iso-8859-16">
                          ISO-8859-16
                        </option>
                        <option data-load-encoding="2" value="koi8-r">
                          KOI8-R
                        </option>
                        <option data-load-encoding="2" value="koi8-u">
                          KOI8-U
                        </option>
                        <option data-load-encoding="2" value="macintosh">
                          macintosh
                        </option>
                        <option data-load-encoding="2" value="windows-874">
                          Windows-874
                        </option>
                        <option data-load-encoding="2" value="windows-1250">
                          Windows-1250
                        </option>
                        <option data-load-encoding="2" value="windows-1251">
                          Windows-1251
                        </option>
                        <option data-load-encoding="2" value="windows-1252">
                          Windows-1252
                        </option>
                        <option data-load-encoding="2" value="windows-1253">
                          Windows-1253
                        </option>
                        <option data-load-encoding="2" value="windows-1254">
                          Windows-1254
                        </option>
                        <option data-load-encoding="2" value="windows-1255">
                          Windows-1255
                        </option>
                        <option data-load-encoding="2" value="windows-1256">
                          Windows-1256
                        </option>
                        <option data-load-encoding="2" value="windows-1257">
                          Windows-1257
                        </option>
                        <option data-load-encoding="2" value="windows-1258">
                          Windows-1258
                        </option>
                        <option data-load-encoding="2" value="x-mac-cyrillic">
                          x-mac-cyrillic
                        </option>
                        <option data-load-encoding="2" value="gbk">GBK</option>
                        <option data-load-encoding="2" value="gb18030">
                          gb18030
                        </option>
                        <option data-load-encoding="2" value="big5">
                          Big5
                        </option>
                        <option data-load-encoding="2" value="euc-jp">
                          EUC-JP
                        </option>
                        <option data-load-encoding="2" value="iso-2022-jp">
                          ISO-2022-JP
                        </option>
                        <option data-load-encoding="2" value="shift_jis">
                          Shift_JIS
                        </option>
                        <option data-load-encoding="2" value="euc-kr">
                          EUC-KR
                        </option>
                        <option data-load-encoding="2" value="x-user-defined">
                          x-user-defined
                        </option>
                      </optgroup>
                    </select>
                  </div>
                  <div class="setting">
                    <label for="algorithm">Signature Algorithm</label
                    ><select
                      data-option="algorithm"
                      data-remember="algorithm"
                      data-share="algorithm"
                      id="algorithm"
                    >
                      <option value="MD5">MD5</option>
                      <option value="SHA1">SHA1</option>
                      <option value="SHA224">SHA224</option>
                      <option selected="" value="SHA256">SHA256</option>
                      <option value="SHA384">SHA384</option>
                      <option value="SHA512">SHA512</option>
                      <option value="RIPEMD160">RIPEMD160</option>
                    </select>
                  </div>
                  <div class="setting">
                    <label for="public-key">Public Key</label
                    ><textarea
                      data-option="public-key"
                      data-remember="public-key"
                      data-share="public_key"
                      id="public-key"
                      placeholder="Public Key"
                    ></textarea>
                  </div>
                  <details class="setting-group" open="">
                    <summary>Signature</summary>
                    <div class="setting">
                      <label for="signature-input-type">Type</label
                      ><select
                        data-option="signature-input-type"
                        data-remember="signature-input-type"
                        data-share="signature_input_type"
                        data-target="#passphrase-block"
                        data-toggle="key-type"
                        id="signature-input-type"
                      >
                        <option value="hex">Hex</option>
                        <option value="base64">Base64</option>
                      </select>
                    </div>
                    <div class="setting">
                      <label for="signature">Data</label
                      ><textarea
                        data-option="signature"
                        data-remember="signature"
                        data-share="signature"
                        id="signature"
                        placeholder="Signature"
                      ></textarea>
                    </div>
                  </details>
                </div>
              </div>
            </div>
          </div>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/jsrsasign.js?v=1",
              onload: function () {
                window.method = withOptions(rsa.verify, [
                  "public-key",
                  "algorithm",
                  "signature-input-type",
                  "signature",
                ]);
                methodLoad();
              },
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/jsrsasign-all-min.min.js",
              onload: function () {
                methodLoad();
              },
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/encoding.js?v=8",
              onload: function () {
                methodLoad();
              },
            });
          </script>
          <script>
            delayScripts.push({
              src: "/js/clipboard.min.js",
              onload: function () {
                new ClipboardJS('[data-toggle="copy"]').on(
                  "success",
                  function (e) {
                    showMessage(e.trigger.getAttribute("data-message"));
                  },
                );
              },
              delay: 100,
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/validator.js",
              onload: function () {
                methodLoad();
              },
            });
          </script>
        </main>
      </div>
      <div id="message"></div>
    </div>
    <script defer="" src="/js/sidebar.js"></script>
    <script
      defer=""
      src="https://code.jquery.com/jquery-1.10.1.min.js"
    ></script>
    <script defer="" src="/js/main.js?v=41"></script>
  </body>
</html>
