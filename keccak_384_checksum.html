<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="en" http-equiv="content-language" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Keccak-384 File Hash - Online Tools</title>

    <meta
      content="Sha3,Keccak-384,Keccak384,Keccak,online,hash,checksum,file,URL"
      name="keywords"
    />
    <meta content="emn178" name="author" />
    <meta content="emn178" name="copyright" />
    <meta
      content="This Keccak-384 online tool helps you calculate the hash of a file from local or URL using Keccak-384 without uploading the file."
      name="description"
    />

    <link href="/images/logo.svg" rel="icon" />
    <script>
      var delayScripts = [];
      var waitLoadCount = 0;
      if (localStorage.getItem("DARK") === "1") {
        document.documentElement.classList.add("dark-theme");
      }
    </script>
    <link href="/css/style.css?v=27" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar"></div>
      <div id="content">
        <div class="top-nav">
          <button
            aria-controls="sidebar"
            aria-expanded="false"
            aria-label="Menu"
            id="sidebar-toggler"
          >
            <img alt="Menu" height="24" src="/images/menu.svg" width="24" />
          </button>
        </div>
        <header>
          <h1>Keccak-384 File Hash</h1>
          <p>
            This Keccak-384 online tool helps you calculate the hash of a file
            from local or URL using Keccak-384 without uploading the file.
          </p>
        </header>
        <main>
          <div class="layout">
            <div class="layout-block">
              <div class="input">
                <div class="block block-fill">
                  <div class="block-title">
                    Input
                    <div class="toolbar">
                      <button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    data-remember="input"
                    data-share="input"
                    id="input"
                    placeholder="Enter the URL here, and it will attempt to download. If it cannot be downloaded programmatically, you may need to download it manually."
                    spellcheck="false"
                    style="display: none"
                  ></textarea>
                  <div class="droppable-zone container" id="droppable-zone">
                    <input
                      class="droppable-file"
                      data-auto-update=""
                      id="file"
                      type="file"
                    />
                    <div class="droppable-zone-wrapper">
                      <img
                        alt="File"
                        class="droppable-zone-icon"
                        src="/images/file.svg"
                      />
                      <div class="droppable-zone-text">
                        Drag and drop the file here or click to select a file.
                        It will process locally and won't be uploaded.
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="output">
                <div class="block block-fill">
                  <div class="block-title">
                    Output
                    <div class="toolbar">
                      <button
                        class="icon"
                        data-clipboard-target="#output"
                        data-message="Output copied"
                        data-toggle="copy"
                      >
                        <img
                          alt="Copy"
                          src="/images/copy.svg"
                          title="Copy"
                        /></button
                      ><button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    data-encoding-from="#output-type"
                    data-toggle="monacoEditor"
                    id="output"
                    placeholder="Output here..."
                    readonly="readonly"
                    spellcheck="false"
                  ></textarea>
                </div>
              </div>
            </div>
            <div class="settings">
              <div class="block block-fill">
                <div class="block-title">Settings</div>
                <div class="container">
                  <div class="setting">
                    <a class="btn" id="execute">Hash</a>
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input
                        checked=""
                        id="auto-update"
                        type="checkbox"
                        value="1"
                      />
                      <div class="toggle"></div>
                      <span>Auto Update</span></label
                    >
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input id="remember-input" type="checkbox" value="1" />
                      <div class="toggle"></div>
                      <span>Remember Input</span></label
                    >
                  </div>
                  <div class="setting">
                    <label for="file-type">Input Type</label
                    ><select
                      data-auto-update=""
                      data-remember="file-type"
                      id="file-type"
                    >
                      <option value="file">File</option>
                      <option value="url">URL</option>
                    </select>
                  </div>
                  <div class="setting">
                    <label for="output-type">Output Encoding</label
                    ><select
                      data-auto-update=""
                      data-remember="output-type"
                      data-share="output_type"
                      data-toggle="encoding"
                      data-type="hex"
                      id="output-type"
                    >
                      <option value="hex">Hex (Lower Case)</option>
                      <option value="hex_upper">Hex (Upper Case)</option>
                      <option data-load-encoding="base64" value="base64">
                        Base64
                      </option>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "https://cdnjs.cloudflare.com/ajax/libs/js-sha3/0.9.3/sha3.min.js",
              onload: function () {
                window.method = keccak_384;
                methodLoad();
              },
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/encoding.js?v=8",
              onload: function () {
                methodLoad();
              },
            });
          </script>
          <script>
            delayScripts.push({
              src: "/js/clipboard.min.js",
              onload: function () {
                new ClipboardJS('[data-toggle="copy"]').on(
                  "success",
                  function (e) {
                    showMessage(e.trigger.getAttribute("data-message"));
                  },
                );
              },
              delay: 100,
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/url-blob.js?v=1",
              onload: function () {
                methodLoad();
              },
            });
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/droppable-file.js",
              onload: function () {
                methodLoad();
              },
            });
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/file.js?v=10",
              onload: function () {
                methodLoad();
              },
            });
          </script>
        </main>
      </div>
      <div id="message"></div>
    </div>
    <script defer="" src="/js/sidebar.js"></script>
    <script
      defer=""
      src="https://code.jquery.com/jquery-1.10.1.min.js"
    ></script>
    <script defer="" src="/js/main.js?v=41"></script>
  </body>
</html>
