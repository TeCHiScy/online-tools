    <style>
      body {
        font-family: monospace, monospace;
      }

      .hash-results {
        overflow: hidden;
      }

      .hash-results-header {
        padding: 0.4rem 0.75rem;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hash-row {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid var(--pico-muted-border-color);
        transition: background-color 0.1s;
      }

      .hash-row:last-child {
        border-bottom: none;
      }

      .hash-row:hover {
        background: var(--accent-bg, #f5f7ff);
      }

      .hash-label {
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        width: var(--hash-label-width);
        flex-shrink: 0;
        padding: 0.15rem 0.35rem;
        text-align: center;
        user-select: none;
      }

      .hash-output {
        flex: 1;
        min-width: 0;
        font-size: 0.8rem;
        background: transparent;
        border: none;
        padding: 0;
        margin: 0;
        color: var(--pico-color);
        box-shadow: none;
        cursor: text;
      }

      .hash-output:focus {
        outline: none;
        box-shadow: none;
      }

      .hash-output::placeholder {
        color: var(--pico-muted-color);
        font-style: italic;
      }

      .hash-actions {
        display: flex;
        gap: 0.125rem;
        flex-shrink: 0;
      }

      .hash-actions button {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 1.75rem;
        padding: 0;
        border: none;
        background: transparent;
        cursor: pointer;
        opacity: 0.5;
        margin-bottom: 0;
      }

      .hash-actions button:hover {
        opacity: 1;
        background: var(--pico-muted-border-color);
      }

      details.settings-panel > summary {
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 0;
        user-select: none;
      }

      .settings-body label {
        font-size: 0.8rem;
        font-weight: 500;
      }

      .settings-body select,
      .settings-body input[type="text"] {
        font-size: 0.85rem;
        width: 40%;
      }

      .settings-body fieldset {
        border: none;
        padding: 0;
        margin: 0.5rem 0 0;
      }

      .settings-body fieldset label {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.875rem;
        font-weight: 400;
        color: var(--pico-color);
        margin-bottom: 0.25rem;
        cursor: pointer;
      }

      .settings-body fieldset input[type="checkbox"] {
        margin: 0;
        width: 1rem;
        height: 1rem;
      }

      #hmac {
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid var(--pico-muted-border-color);
      }

      #hmac summary {
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--pico-muted-color);
        margin-bottom: 0.5rem;
      }

      /* Message toast */
      #message {
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        pointer-events: none;
      }
    </style>

        <script>
          var hashes = { md2: md2, md4: md4, md5: md5 };

          window.method = function (val) {
            var hmacEnabled = document.getElementById("hmac-enabled").checked;
            ["md2", "md4", "md5"].forEach((algo) => {
              const fn = hashes[algo];
              var $out = $("#output-" + algo);
              if (!fn) {
                $out.val("loading ...");
                return;
              }
              try {
                var result;
                if (hmacEnabled) {
                  var key = ot.getInput($("#hmac-key"));
                  if (key === false) {
                    $out.val("");
                    return;
                  }
                  result = fn.hmac(key, val);
                } else {
                  result = fn(val);
                }
                ot.setOutput($out, result);
              } catch (e) {
                $out.val(String(e));
              }
            });
            return "";
          };

          function copy(el) {
            console.log("Copying text:", el.clipboardTarget);
            if($refs[el.clipboardTarget]) {
              const text = $refs[el.clipboardTarget].value;
              if (text) {
                navigator.clipboard
                  .writeText(text)
                  .then(function () {
                    showMessage("Share link copied");
                  })
                  .catch(function () {
                    showMessage("Copy failed", true);
                  });
              }
            } else {
              console.warn("Clipboard target not found:", el.clipboardTarget);
            }
 
          };

          ++waitLoadCount;
          delayScripts.push({
            src: "https://nf404.github.io/crypto-api/crypto-api.min.js",
            onload: function () {
              methodLoad();
            },
          });
          ++waitLoadCount;
          delayScripts.push({
            src: "/js/encoding.js?v=8",
            onload: function () {
              methodLoad();
            },
          });

          new ClipboardJS('[data-toggle="copy"]').on("success", function (e) {
            showMessage(e.trigger.getAttribute("data-message"));
          });
        </script>
