<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="en" http-equiv="content-language" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Base58 Decode - Online Tools</title>

    <meta
      content="Base58,online,decode,string,UTF-8, UTF-16, HEX, Bas64"
      name="keywords"
    />
    <meta content="emn178" name="author" />
    <meta content="emn178" name="copyright" />
    <meta
      content="This online Base58 decoding tool helps you decode Base58 to text or binary. You can output UTF-8, UTF-16, Hex, Base64, or other encodings."
      name="description"
    />

    <link href="/images/logo.svg" rel="icon" />
    <script>
      var delayScripts = [];
      var waitLoadCount = 0;
      if (localStorage.getItem("DARK") === "1") {
        document.documentElement.classList.add("dark-theme");
      }
    </script>
    <link href="/css/style.css?v=27" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar"></div>
      <div id="content">
        <div class="top-nav">
          <button
            aria-controls="sidebar"
            aria-expanded="false"
            aria-label="Menu"
            id="sidebar-toggler"
          >
            <img alt="Menu" height="24" src="/images/menu.svg" width="24" />
          </button>
        </div>
        <header>
          <h1>Base58 Decode</h1>
          <p>
            This online Base58 decoding tool helps you decode Base58 to text or
            binary. You can output UTF-8, UTF-16, Hex, Base64, or other
            encodings.
          </p>
        </header>
        <main>
          <div class="layout">
            <div class="layout-block">
              <div class="input">
                <div class="block block-fill">
                  <div class="block-title">
                    Input
                    <div class="toolbar">
                      <button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    data-auto-update=""
                    data-encoding-from="#input-type"
                    data-remember="input"
                    data-share="input"
                    data-toggle="monacoEditor"
                    id="input"
                    placeholder="Enter here..."
                    spellcheck="false"
                  ></textarea>
                </div>
              </div>
              <div class="output">
                <div class="block block-fill">
                  <div class="block-title">
                    Output
                    <div class="toolbar">
                      <button
                        class="icon"
                        id="swap"
                        onclick="
                          swap('base58_encode.html', [
                            ['#output', '#input'],
                            ['#output-type', '#input-type'],
                          ])
                        "
                      >
                        <img
                          alt="Swap"
                          src="/images/swap.svg"
                          title="Swap"
                        /></button
                      ><button
                        class="icon"
                        data-clipboard-target="#output"
                        data-message="Output copied"
                        data-toggle="copy"
                      >
                        <img
                          alt="Copy"
                          src="/images/copy.svg"
                          title="Copy"
                        /></button
                      ><button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    data-encoding-from="#output-type"
                    data-toggle="monacoEditor"
                    id="output"
                    placeholder="Output here..."
                    readonly="readonly"
                    spellcheck="false"
                  ></textarea>
                </div>
                <details class="block text-only" data-toggle="copyblock">
                  <summary class="block-title">
                    Share Link
                    <div class="toolbar">
                      <button
                        class="icon"
                        data-clipboard-target="#share-link"
                        data-message="Share link copied"
                        data-toggle="copy"
                      >
                        <img alt="Copy" src="/images/copy.svg" title="Copy" />
                      </button>
                    </div>
                  </summary>
                  <input
                    id="share-link"
                    placeholder="Share Link"
                    readonly="readonly"
                    type="text"
                  />
                </details>
              </div>
            </div>
            <div class="settings">
              <div class="block block-fill">
                <div class="block-title">Settings</div>
                <div class="container">
                  <div class="setting">
                    <a class="btn" id="execute">Decode</a>
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input
                        checked=""
                        id="auto-update"
                        type="checkbox"
                        value="1"
                      />
                      <div class="toggle"></div>
                      <span>Auto Update</span></label
                    >
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input id="remember-input" type="checkbox" value="1" />
                      <div class="toggle"></div>
                      <span>Remember Input</span></label
                    >
                  </div>
                  <div class="setting">
                    <label for="output-type">Output Encoding</label
                    ><select
                      data-auto-update=""
                      data-remember="output-type"
                      data-share="output_type"
                      data-toggle="encoding"
                      id="output-type"
                    >
                      <optgroup label="Binary">
                        <option value="hex">Hex (Lower Case)</option>
                        <option value="hex_upper">Hex (Upper Case)</option>
                        <option data-load-encoding="base64" value="base64">
                          Base64
                        </option>
                      </optgroup>
                      <optgroup label="Text">
                        <option
                          data-load-encoding="1"
                          selected=""
                          value="utf-8"
                        >
                          UTF-8
                        </option>
                        <option data-load-encoding="1" value="utf-16le">
                          UTF-16LE
                        </option>
                        <option data-load-encoding="1" value="utf-16be">
                          UTF-16BE
                        </option>
                        <option data-load-encoding="2" value="ibm866">
                          IBM866
                        </option>
                        <option data-load-encoding="2" value="iso-8859-2">
                          ISO-8859-2
                        </option>
                        <option data-load-encoding="2" value="iso-8859-3">
                          ISO-8859-3
                        </option>
                        <option data-load-encoding="2" value="iso-8859-4">
                          ISO-8859-4
                        </option>
                        <option data-load-encoding="2" value="iso-8859-5">
                          ISO-8859-5
                        </option>
                        <option data-load-encoding="2" value="iso-8859-6">
                          ISO-8859-6
                        </option>
                        <option data-load-encoding="2" value="iso-8859-7">
                          ISO-8859-7
                        </option>
                        <option data-load-encoding="2" value="iso-8859-8">
                          ISO-8859-8
                        </option>
                        <option data-load-encoding="2" value="iso-8859-8-i">
                          ISO-8859-8-I
                        </option>
                        <option data-load-encoding="2" value="iso-8859-10">
                          ISO-8859-10
                        </option>
                        <option data-load-encoding="2" value="iso-8859-13">
                          ISO-8859-13
                        </option>
                        <option data-load-encoding="2" value="iso-8859-14">
                          ISO-8859-14
                        </option>
                        <option data-load-encoding="2" value="iso-8859-15">
                          ISO-8859-15
                        </option>
                        <option data-load-encoding="2" value="iso-8859-16">
                          ISO-8859-16
                        </option>
                        <option data-load-encoding="2" value="koi8-r">
                          KOI8-R
                        </option>
                        <option data-load-encoding="2" value="koi8-u">
                          KOI8-U
                        </option>
                        <option data-load-encoding="2" value="macintosh">
                          macintosh
                        </option>
                        <option data-load-encoding="2" value="windows-874">
                          Windows-874
                        </option>
                        <option data-load-encoding="2" value="windows-1250">
                          Windows-1250
                        </option>
                        <option data-load-encoding="2" value="windows-1251">
                          Windows-1251
                        </option>
                        <option data-load-encoding="2" value="windows-1252">
                          Windows-1252
                        </option>
                        <option data-load-encoding="2" value="windows-1253">
                          Windows-1253
                        </option>
                        <option data-load-encoding="2" value="windows-1254">
                          Windows-1254
                        </option>
                        <option data-load-encoding="2" value="windows-1255">
                          Windows-1255
                        </option>
                        <option data-load-encoding="2" value="windows-1256">
                          Windows-1256
                        </option>
                        <option data-load-encoding="2" value="windows-1257">
                          Windows-1257
                        </option>
                        <option data-load-encoding="2" value="windows-1258">
                          Windows-1258
                        </option>
                        <option data-load-encoding="2" value="x-mac-cyrillic">
                          x-mac-cyrillic
                        </option>
                        <option data-load-encoding="2" value="gbk">GBK</option>
                        <option data-load-encoding="2" value="gb18030">
                          gb18030
                        </option>
                        <option data-load-encoding="2" value="big5">
                          Big5
                        </option>
                        <option data-load-encoding="2" value="euc-jp">
                          EUC-JP
                        </option>
                        <option data-load-encoding="2" value="iso-2022-jp">
                          ISO-2022-JP
                        </option>
                        <option data-load-encoding="2" value="shift_jis">
                          Shift_JIS
                        </option>
                        <option data-load-encoding="2" value="euc-kr">
                          EUC-KR
                        </option>
                        <option data-load-encoding="2" value="x-user-defined">
                          x-user-defined
                        </option>
                      </optgroup>
                    </select>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/base58.js?v=3",
              onload: function () {
                window.method = base58Decode;
                methodLoad();
              },
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/base-x.min.js",
              onload: function () {
                methodLoad();
              },
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/encoding.js?v=8",
              onload: function () {
                methodLoad();
              },
            });
          </script>
          <script>
            delayScripts.push({
              src: "/js/clipboard.min.js",
              onload: function () {
                new ClipboardJS('[data-toggle="copy"]').on(
                  "success",
                  function (e) {
                    showMessage(e.trigger.getAttribute("data-message"));
                  },
                );
              },
              delay: 100,
            });
          </script>
        </main>
      </div>
      <div id="message"></div>
    </div>
    <script defer="" src="/js/sidebar.js"></script>
    <script
      defer=""
      src="https://code.jquery.com/jquery-1.10.1.min.js"
    ></script>
    <script defer="" src="/js/main.js?v=41"></script>
  </body>
</html>
