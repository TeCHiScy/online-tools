<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="en" http-equiv="content-language" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>XML Minifier - Online Tools</title>

    <meta content="Minify,Compress,Compact" name="keywords" />
    <meta content="emn178" name="author" />
    <meta content="emn178" name="copyright" />
    <meta
      content="This free online XML minifier helps you minify your XML string and make it more cleaner. It can remove indentation, new lines and comments to reduce size."
      name="description"
    />

    <link href="/images/logo.svg" rel="icon" />
    <script>
      var delayScripts = [];
      var waitLoadCount = 0;
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      if (location.hostname != "localhost") {
        gtag("js", new Date());
        gtag("config", "G-WT6N5R6W6Z");

        (function () {
          var gaUrl =
            "https://www.googletagmanager.com/gtag/js?id=G-WT6N5R6W6Z";

          function initGTMOnEvent(e) {
            document.removeEventListener(event.type, initGTMOnEvent);
            initGTM();
          }

          function initGTM() {
            if (window.gtmDidInit) {
              return;
            }
            window.gtmDidInit = true;
            var script = document.createElement("script");
            script.async = true;
            script.src = gaUrl;
            document.head.appendChild(script);
          }

          if (document.addEventListener) {
            document.addEventListener("DOMContentLoaded", function () {
              setTimeout(initGTM, 3500);
            });
            document.addEventListener("scroll", initGTMOnEvent);
            document.addEventListener("mousemove", initGTMOnEvent);
            document.addEventListener("touchstart", initGTMOnEvent);
          } else {
            delayScripts.push({
              src: gaUrl,
            });
          }
        })();
      }

      if (localStorage.getItem("DARK") === "1") {
        document.documentElement.classList.add("dark-theme");
      }
    </script>
    <link href="/css/style.css?v=27" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <div id="sidebar"></div>
      <div id="content">
        <div class="top-nav">
          <button
            aria-controls="sidebar"
            aria-expanded="false"
            aria-label="Menu"
            id="sidebar-toggler"
          >
            <img alt="Menu" height="24" src="/images/menu.svg" width="24" />
          </button>
        </div>
        <header>
          <h1>XML Minifier</h1>
          <p>
            This free online XML minifier helps you minify your XML string and
            make it more cleaner. It can remove indentation, new lines and
            comments to reduce size.
          </p>
        </header>
        <main>
          <div class="layout">
            <div class="layout-block">
              <div class="input">
                <div class="block block-fill">
                  <div class="block-title">
                    Input
                    <div class="toolbar">
                      <button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    data-auto-update=""
                    data-encoding-from="#input-type"
                    data-language="xml"
                    data-remember="input"
                    data-share="input"
                    data-toggle="monacoEditor"
                    id="input"
                    placeholder="Enter here..."
                    spellcheck="false"
                  ></textarea>
                </div>
              </div>
              <div class="output">
                <div class="block block-fill">
                  <div class="block-title">
                    Output
                    <div class="toolbar">
                      <button
                        class="icon"
                        data-clipboard-target="#output"
                        data-message="Output copied"
                        data-toggle="copy"
                      >
                        <img
                          alt="Copy"
                          src="/images/copy.svg"
                          title="Copy"
                        /></button
                      ><button class="icon" data-toggle="fullscreen">
                        <img
                          alt="Full Screen"
                          class="fullscreen-icon"
                          src="/images/fullscreen.svg"
                          title="Full Screen"
                        /><img
                          alt="Full Screen"
                          class="fullscreen-icon-exit"
                          src="/images/fullscreen-exit.svg"
                          title="Full Screen"
                        />
                      </button>
                    </div>
                  </div>
                  <textarea
                    class="container"
                    data-encoding-from="#output-type"
                    data-language="xml"
                    data-toggle="monacoEditor"
                    id="output"
                    placeholder="Output here..."
                    readonly="readonly"
                    spellcheck="false"
                  ></textarea>
                </div>
              </div>
            </div>
            <div class="settings">
              <div class="block block-fill">
                <div class="block-title">Settings</div>
                <div class="container">
                  <div class="setting">
                    <a class="btn" id="execute">Minify</a>
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input
                        checked=""
                        id="auto-update"
                        type="checkbox"
                        value="1"
                      />
                      <div class="toggle"></div>
                      <span>Auto Update</span></label
                    >
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input id="remember-input" type="checkbox" value="1" />
                      <div class="toggle"></div>
                      <span>Remember Input</span></label
                    >
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input id="pretty-display" type="checkbox" value="1" />
                      <div class="toggle"></div>
                      <span>Pretty Display</span></label
                    >
                  </div>
                  <div class="setting">
                    <label class="switcher"
                      ><input
                        checked=""
                        data-option="remove-comments"
                        data-remember="remove-comments"
                        id="remove-comments"
                        type="checkbox"
                        value="1"
                      />
                      <div class="toggle"></div>
                      <span>Remove Comments</span></label
                    >
                  </div>
                </div>
              </div>
            </div>
          </div>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/xml.js?v=2",
              onload: function () {
                window.method = withOptions(xml.minify, ["remove-comments"]);
                methodLoad();
              },
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/xml-formatter-singleton.min.js",
              onload: function () {
                methodLoad();
              },
            });
          </script>
          <script>
            delayScripts.push({
              src: "/js/clipboard.min.js",
              onload: function () {
                new ClipboardJS('[data-toggle="copy"]').on(
                  "success",
                  function (e) {
                    showMessage(e.trigger.getAttribute("data-message"));
                    gtag("event", "copy");
                  },
                );
              },
              delay: 100,
            });
          </script>
          <script>
            ++waitLoadCount;
            delayScripts.push({
              src: "/js/monaco-editor.js?v=1",
              onload: function () {
                methodLoad();
              },
            });
          </script>
        </main>
      </div>
      <div id="message"></div>
    </div>
    <script defer="" src="/js/sidebar.js"></script>
    <script
      defer=""
      src="https://code.jquery.com/jquery-1.10.1.min.js"
    ></script>
    <script defer="" src="/js/main.js?v=41"></script>
  </body>
</html>
